<!DOCTYPE html>
<html>
<head>
    <title>JFB Club Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial;
        }

        /* BACKGROUND IMAGE */
        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url("{{ url_for('static', filename='gym.jpg') }}") no-repeat center center;
            background-size: cover;
            filter: brightness(0.5);
        }

        /* CENTER LOGIN OVER IMAGE */
        .login-wrapper {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GLASS LOGIN BOX */
        .login-box {
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 25px rgba(0,255,204,0.5);
            color: white;
            border: 1px solid rgba(0,255,204,0.3);
        }

        .login-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }

        .form-control {
            background: transparent;
            border: 1px solid #00ffcc;
            color: white;
        }

        .form-control:focus {
            box-shadow: 0 0 10px #00bfff;
            border-color: #00bfff;
        }

        .btn-custom {
            width: 100%;
            background: linear-gradient(to right, #00ffcc, #00bfff);
            border: none;
            font-weight: bold;
            color: black;
        }

    </style>
</head>

<body>

<!-- BACKGROUND IMAGE -->
<div class="bg"></div>

<!-- LOGIN OVER IMAGE -->
<div class="login-wrapper">

    <div class="login-box">

        <div class="login-title">🔥 JFB CLUB LOGIN 🔥</div>

        <form method="POST">

            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-custom">LOGIN</button>

        </form>

    </div>

</div>

</body>
</html>
