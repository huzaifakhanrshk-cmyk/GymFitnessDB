<!DOCTYPE html>
<html>
<head>
    <title>Gym System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #1e1e2f;
            color: white;
        }

        .sidebar {
            height: 100vh;
            background: #111827;
            padding: 20px;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 5px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #2563eb;
        }

        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .card {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4 class="text-success">🏋 Gym Panel</h4>

    <a href="/dashboard">📊 Dashboard</a>
    <a href="/">👥 Members</a>
    <a href="/trainers">🏋 Trainers</a>
    <a href="/attendance">📅 Attendance</a>
    <a href="/payments">💳 Payments</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="main">

    {% block content %}

    {% endblock %}

</div>

</body>
</html>
