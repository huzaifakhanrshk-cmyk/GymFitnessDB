{% extends "base.html" %}

{% block content %}

<h2 class="text-success mb-3">Members</h2>

<!-- ADD MEMBER FORM -->
<div class="card bg-secondary p-3 mb-4">

    <form action="/add" method="POST" class="row g-2">

        <div class="col-md-3">
            <input type="text" name="name" class="form-control" placeholder="Name" required>
        </div>

        <div class="col-md-2">
            <input type="number" name="age" class="form-control" placeholder="Age" required>
        </div>

        <div class="col-md-2">
            <select name="gender" class="form-control">
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="col-md-3">
            <input type="text" name="phone" class="form-control" placeholder="Phone" required>
        </div>

        <div class="col-md-2">
            <button class="btn btn-success w-100">Add</button>
        </div>

    </form>

</div>

<!-- TABLE -->
<div class="card bg-secondary p-3">

    <table class="table table-dark table-hover">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>

        {% for member in members %}
        <tr>
            <td>{{ member[0] }}</td>
            <td>{{ member[1] }}</td>
            <td>{{ member[2] }}</td>
            <td>{{ member[3] }}</td>
            <td>{{ member[4] }}</td>

            <td>
                <a href="/trainers">Trainers</a>
                
                <a href="/mark_attendance/{{ member[0] }}" class="btn btn-success btn-sm me-1">Present</a>

                <a href="/edit/{{ member[0] }}" class="btn btn-primary btn-sm me-1">Edit</a>

                <a href="/delete/{{ member[0] }}" class="btn btn-danger btn-sm me-1"
                   onclick="return confirm('Delete this member?')">
                    Delete
                </a>

                <form action="/pay/{{ member[0] }}" method="POST" style="display:inline;">
                    <input type="number" name="amount" placeholder="₹"
                           class="form-control form-control-sm d-inline w-25">
                    <button class="btn btn-warning btn-sm">Pay</button>
                </form>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
